وعی (Custom AI Silicon) . در حالی که تا دو سال پیش، کل بحث صنعت بر روی کمبود تراشه‌های H100 انویدیا متمرکز بود، اکنون بازار به سمت معماری‌های خاص‌منظوره و پلتفرم‌های محاسباتی عظیمی چون NVIDIA GB200 NVL72 و تراشه‌های اختصاصی غول‌های ابری حرکت کرده است. در این مقاله تخصصی، به کالبدشکافی ساختار تراشه‌های مدرن، نبرد بین طراحان سیلیکون، تکنولوژی خنک‌سازی مایع و آینده پردازش ابری در اواسط دهه ۲۰۲۰ می‌پردازیم. ۱. عبور از سیلیکون‌های عمومی به ASICهای استدلالی محدودیت‌های فیزیکی ماده (قانون مور) و بحران مصرف انرژی، شرکت‌های فناوری را وادار کرده است تا از پردازنده‌های گرافیکی همه‌منظوره (General-Purpose GPUs) فاصله گرفته و به سمت مدارهای مجتمع با کاربرد خاص (ASIC) حرکت کنند. این تراشه‌های جدید صرفاً برای دو هدف طراحی شده‌اند: ضرب ماتریس‌های عظیم در فاز آموزش و استنتاج فوق‌سریع در فاز اجرا. «ما در سال ۱۴۰۵ دیگر فقط \"تراشه\" نمی‌فروشیم، ما \"دیتاسنترهای یکپارچه\" می‌فروشیم. واحد محاسبات در عصر هوش مصنوعی، یک قطعه سیلیکونی نیست، بلکه یک رک کامل سرور است که به عنوان یک ابرپردازنده واحد عمل می‌کند. کسی که کنترل لایه‌ی فیزیکی را داشته باشد، کنترل آینده‌ی هوش را در دست دارد.» – جنسن هوانگ، مدیرعامل انویدیا در اجلاس GTC 2026 این تغییر دیدگاه بنیادین منجر به تولد معماری Blackwell و سیستم‌هایی نظیر GB200 شده است. در نمودار تعاملی زیر، بلوک‌های اساسی یک تراشه مدرن هوش مصنوعی و مسیرهای ارتباطی (Data Bus) با پهنای باند تراهرتزی آن‌ها را مشاهده می‌کنید. توجه کنید که چطور حافظه HBM4 به طور مستقیم روی هسته‌های پردازشی قرار گرفته است. معماری Blackwell و پادشاهی سیستم‌های GB200 قلب تپنده ابرکامپیوترهای هوشمند در سال ۱۴۰۵، سیستم NVIDIA GB200 NVL72 است. این غول سخت‌افزاری از ۳۶ پردازنده Grace (مبتنی بر ARM) و ۷۲ پردازنده گرافیکی Blackwell (B200) تشکیل شده است که با استفاده از فناوری NVLink 5.0 با پهنای باند خیره‌کننده ۱.۸ ترابایت بر ثانیه به یکدیگر متصل شده‌اند. این سیستم می‌تواند به عنوان یک کارت گرافیک واحد با حافظه‌ای در مقیاس ۱۸ ترابایت عمل کند که برای آموزش و اجرای مدل‌های تریلیون پارامتری (نظیر GPT-5 یا Claude 4.7) حیاتی است. ۲. استقلال سیلیکونی: تراشه‌های اختصاصی گوگل، آمازون و مایکروسافت وابستگی مطلق به انویدیا و قیمت‌های سرسام‌آور آن، غول‌های فناوری را به توسعه سیلیکون‌های اختصاصی خود در سال ۲۰۲۶ ترغیب کرده است. این تراشه‌ها اکنون سهم بزرگی از بازار را در اختیار دارند: Google TPU v6 (Trillium): گوگل ششمین نسل از پردازنده‌های تنسور خود را با تمرکز بر معماری MoE (Mixture-of-Experts) توسعه داده است. این تراشه موتور اصلی اجرای Gemini 2.5 Pro است و بهره‌وری انرژی آن ۴ برابر بهتر از نسل قبلی است. AWS Trainium 3: آمازون با معرفی این تراشه‌ها، هزینه‌های آموزش مدل‌های پایه را برای مشتریان ابری خود تا ۴۵ درصد کاهش داده است. این تراشه با بهینه‌سازی‌های نرم‌افزاری برای PyTorch و JAX جفت شده است. Microsoft Maia 200: مایکروسافت این تراشه‌ها را اختصاصاً برای اجرای سرویس‌های Copilot و عامل‌های هوشمند در پلتفرم Azure طراحی کرده است. تمرکز اصلی مایا ۲۰۰ بر روی کاهش تاخیر (Latency) در پاسخگویی به کاربران است. تحلیل بازار ۱۴۰۵: در حالی که انویدیا همچنان حاکم بلامنازع فاز «آموزش مدل‌های عظیم» است، تراشه‌های سفارشی شرکت‌های ابری در فاز «استنتاج» (Inference) – که ۸۰٪ هزینه‌های جاری هوش مصنوعی را شامل می‌شود – در حال تسخیر بازار هستند. ۳. بحران گرما و انقلاب خنک‌کننده‌های مایع مستقیم مصرف انرژی یک رک از سیستم‌های مدرن در سال ۲۰۲۶ می‌تواند به ۱۳۰ کیلووات (kW) برسد. خنک‌سازی با هوا برای چنین چگالی توانی کاملاً منسوخ و غیرممکن شده است. به همین دلیل، در سال ۱۴۰۵، سیستم‌های Direct-to-Chip Liquid Cooling به یک استاندارد اجباری برای تمامی دیتاسنترهای هوش مصنوعی تبدیل شده‌اند. این یعنی آب یا مایعات خنک‌کننده مخصوص مستقیماً بر روی سطح تراشه جریان می‌یابند تا دمای آن را در محدوده امن نگه دارند. تقاضا برای تجهیزات خنک‌کننده مایع در سال ۲۰۲۶ با رشد ۵۰۰ درصدی روبرو بوده و شرکت‌های سازنده رادیاتورهای صنعتی به بازیگران جدید و استراتژیک دنیای تکنولوژی تبدیل شده‌اند. نتیجه‌گیری: آینده در گروی سخت‌افزار هوشمند صنعت سخت‌افزار هوش مصنوعی در سال ۱۴۰۵ ثابت کرد که نرم‌افزار بدون خانه (سخت‌افزار) کارآمد، بی‌معناست. تراشه‌های سفارشی نه تنها هزینه‌ها را کاهش داده‌اند، بلکه امکان ساخت مدل‌هایی را فراهم کرده‌اند که پیش از این به دلیل محدودیت‌های حافظه غیرممکن بودند. ما در تکناو معتقدیم که دهه آیند
